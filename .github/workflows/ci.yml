name: CI

on:
  push:
    branches: [main, "feature/*", "feat/*", "fix/*"]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: vyapaar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install fastapi uvicorn sqlalchemy pydantic pydantic-settings structlog slowapi
          pip install pytest pytest-cov
          pip install starlette

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short \
            --ignore=tests/integration/test_ocr_pipeline.py \
            --ignore=tests/integration/test_whatsapp_webhook.py \
            --ignore=tests/unit/test_compliance_engine.py \
            --ignore=tests/unit/test_pdf_generator.py
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:testpass@localhost:5432/vyapaar_test
          REDIS_URL: redis://localhost:6379/0
          APP_ENV: test
          PYTHONPATH: backend

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Type check
        run: cd frontend && npx tsc --noEmit

      - name: Build
        run: cd frontend && npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "0"
